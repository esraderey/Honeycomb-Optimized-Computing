name: Security

on:
  push:
    branches: [main, "phase/**"]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 05:00 UTC — catches newly-disclosed CVEs against pinned deps.
    - cron: "0 5 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: bandit (SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install "bandit==1.8.0"
      # Phase 2 baseline: 0 HIGH / 0 MEDIUM / 0 LOW. Any regression fails CI.
      # -x excludes test / benchmark / snapshot dirs. -ll reports MEDIUM+, -i
      # tells bandit to return exit code 1 if any issue is found at or above
      # the severity floor.
      - name: Run bandit
        run: |
          python -m bandit -r . \
            -x ./tests,./benchmarks,./snapshot,./__pycache__,./.hypothesis \
            -f json -o bandit_report.json \
            || true
          python -m bandit -r . \
            -x ./tests,./benchmarks,./snapshot,./__pycache__,./.hypothesis \
            -ll -ii
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit_report.json
          retention-days: 30

  pip-audit:
    name: pip-audit (runtime deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install "pip-audit==2.9.0"
      - run: python -m pip_audit -r requirements.txt --format columns
      - run: python -m pip_audit -r requirements-dev.txt --format columns

  safety:
    name: safety (defense-in-depth)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install safety
      # safety CLI is less strict than pip-audit and serves as cross-check
      # against a different vulnerability database. Non-blocking (CI-soft)
      # because its commercial tier can slow down on free usage.
      - run: python -m safety check --file=requirements.txt --short-report
