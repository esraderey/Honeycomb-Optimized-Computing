name: Lint

on:
  push:
    branches: [main, "phase/**"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ruff:
    name: ruff check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install "ruff==0.8.6"
      - run: python -m ruff check .

  black:
    name: black --check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install "black==26.3.1"
      - run: python -m black --check .

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install mscs
      # Phase 3: strict mypy only on security/memory/resilience (+ __init__.py).
      # Legacy modules are excluded via [tool.mypy].exclude in pyproject.toml.
      # See ADR-006 for the graduation plan.
      #
      # NOTE: running `python -m mypy .` fails in CI because the checkout
      # directory name "Honeycomb-Optimized-Computing" (hyphens) is not a
      # valid Python package name and mypy infers it as such. Listing files
      # explicitly sidesteps the inference.
      - run: python -m mypy __init__.py security.py memory.py resilience.py
